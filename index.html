<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Orbs Calculator GOD</title>

<!-- 🔗 CONEXIÓN PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00c3ff">

<style>
body {
  font-family: Arial;
  background: #0d0d0d;
  color: white;
  text-align: center;
  padding: 20px;
}

input, button {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

input { width: 80%; }

button {
  background: #00c3ff;
  font-weight: bold;
}

#autocompletar {
  width: 80%;
  margin: auto;
  background: #1a1a1a;
  border-radius: 10px;
  text-align: left;
  max-height: 200px;
  overflow-y: auto;
}

.opcion {
  padding: 10px;
  border-bottom: 1px solid #333;
  display: flex;
  justify-content: space-between;
  cursor: pointer;
}

.opcion:hover {
  background: #00c3ff;
  color: black;
}

#error { color: red; }
#settingsPanel {
  background: #1a1a1a;
  padding: 15px;
  border-radius: 10px;
  margin-top: 15px;
}
</style>
</head>

<body>

<h1>🧮 Orbs Calculator GOD</h1>

<button onclick="toggleSettings()">⚙️ Ajustes</button>

<br><br>

<input type="text" id="item" placeholder="Buscar ítem..." oninput="autocompletarItem()">
<div id="autocompletar"></div>

<input type="number" id="cantidad" placeholder="Cantidad">

<br>

<button onclick="agregarItem()">Agregar</button>
<button onclick="deshacer()">↩️ Deshacer</button>
<button onclick="calcularTotal()">Calcular</button>
<button onclick="reiniciar()">Reiniciar</button>

<div id="error"></div>
<h3 id="lista"></h3>
<h2 id="resultado"></h2>

<div id="settingsPanel" style="display:none;">
  <h2>⚙️ Ajustes</h2>

  <div id="editor"></div>

  <h3>Nuevo ítem</h3>
  <input type="text" id="newName" placeholder="Nombre">
  <input type="number" id="newValue" placeholder="Valor">
  <button onclick="agregarNuevoItem()">Agregar</button>

  <br><br>
  <button onclick="guardarCambios()">💾 Guardar</button>
</div>

<script>

let items = {
"Sphere Essence":150,"Scourge heart":25000,"Evil essence":150,"Destructive melodies":5000,
"Gem cluster":5000,"Purified star soul":77777,"Volatile remnant":2500,"Identity fragment":1111,
"Ice shards":250,"Metal scraps":150,"Memory fragment":5000,"Axurian core":12500,
"Memory core":250,"Clock remnant":175,"Text label wheel":4444,"Archie essence":10000,
"Star fragments":150,"Sword scrap":12500,"Destructive essence":1750,"Eternal flame":6060,
"Energy box":6700,"Forgotten memories":150,"Colorful essence":1500,"Magic cat":6666,
"Brimstone energy":3333,"Destroyed star soul":7500,"X":15000,
"Primal essence":450,"Sanguine essence":66666,"Death butterflies":10000,
"Volatile sphere":1500,"Subspace essence":3500,"Song of the scourge":3500,"MLG glasses":14000,"Tears of the fallen":250,
"Sentinel core":450,"Keter emanation":17500,"Magic essence":350,"Rotor blade":275,"Turbine blades":275,
"Metal pipe":175,"Azur wings":350,"Sora wings":350,"Broken glasses":250,"Gauntlet pieces":225,"DETERMINATION":4040,
"Corrupted star soul":1019970
};

let carrito = [];

function autocompletarItem() {
  let texto = item.value.toLowerCase();
  let contenedor = document.getElementById("autocompletar");
  contenedor.innerHTML = "";

  if (!texto) return;

  Object.keys(items)
    .filter(n => n.toLowerCase().includes(texto))
    .slice(0,5)
    .forEach(n => {
      let div = document.createElement("div");
      div.className = "opcion";
      div.innerHTML = `<span>${n}</span><span>${items[n]}</span>`;
      div.onclick = () => {
        item.value = n;
        contenedor.innerHTML = "";
      };
      contenedor.appendChild(div);
    });
}

function agregarItem() {
  let nombre = item.value;
  let cantidad = parseInt(cantidadInput.value);
  error.innerText = "";

  if (!cantidad || cantidad <= 0) {
    error.innerText = "❌ Cantidad inválida";
    return;
  }

  if (!items[nombre]) {
    error.innerText = "❌ Ítem no válido";
    return;
  }

  carrito.push({nombre, cantidad});
  actualizarLista();

  item.value = "";
  cantidadInput.value = "";
}

function deshacer() {
  carrito.pop();
  actualizarLista();
}

function actualizarLista() {
  lista.innerText = carrito.map(i => `${i.nombre} x${i.cantidad}`).join("\n");
}

function calcularTotal() {
  let total = carrito.reduce((sum,i)=>sum + items[i.nombre]*i.cantidad,0);
  resultado.innerText = "💰 Total: " + total + " orbs";
}

function reiniciar() {
  carrito = [];
  actualizarLista();
  resultado.innerText = "";
}

function toggleSettings() {
  settingsPanel.style.display =
    settingsPanel.style.display === "none" ? "block" : "none";
  cargarEditor();
}

function cargarEditor() {
  editor.innerHTML = "";
  for (let n in items) {
    let div = document.createElement("div");
    div.innerHTML = `
      <input value="${n}" class="edit-name">
      <input type="number" value="${items[n]}" class="edit-value">
    `;
    editor.appendChild(div);
  }
}

function agregarNuevoItem() {
  let nombre = newName.value;
  let valor = parseInt(newValue.value);
  if (!nombre || !valor || valor <= 0) return alert("Datos inválidos");
  items[nombre] = valor;
  cargarEditor();
}

function guardarCambios() {
  let nuevos = {};
  let names = document.querySelectorAll(".edit-name");
  let values = document.querySelectorAll(".edit-value");

  for (let i=0;i<names.length;i++) {
    let n = names[i].value;
    let v = parseInt(values[i].value);
    if (n && v>0) nuevos[n] = v;
  }

  items = nuevos;
  localStorage.setItem("items", JSON.stringify(items));
  alert("Guardado!");
}

window.onload = () => {
  let data = localStorage.getItem("items");
  if (data) items = JSON.parse(data);
};

const item = document.getElementById("item");
const cantidadInput = document.getElementById("cantidad");
const lista = document.getElementById("lista");
const resultado = document.getElementById("resultado");
const error = document.getElementById("error");

</script>

</body>
</html>
